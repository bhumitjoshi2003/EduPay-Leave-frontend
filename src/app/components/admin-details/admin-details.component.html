<div class="admin-details-container" *ngIf="updatedDetails">
    <form #adminForm="ngForm" (ngSubmit)="saveAdmin(adminForm)" novalidate>
        <div class="header">
            <div class="title-section">
                <h2>{{ isNewAdmin ? 'Create New Admin' : 'Admin Profile' }}</h2>
            </div>

            <div class="header-buttons">
                <button type="button" class="edit-btn" *ngIf="!isEditing && canEdit()" (click)="enableEditMode()">
                    Edit Details
                </button>

                <div *ngIf="isEditing" class="editing-group">
                    <button type="submit" class="save-btn">Save</button>
                    <button type="button" class="cancel-btn" (click)="cancelEdit()">Cancel</button>
                </div>

                <button type="button" class="password-btn" (click)="changePassword()"
                    *ngIf="!isNewAdmin && (loggedInUserId === adminId || loggedInUserRole === 'SUPER_ADMIN')">
                    Change Password
                </button>

                <button type="button" class="delete-btn"
                    *ngIf="loggedInUserRole === 'SUPER_ADMIN' && !isNewAdmin && loggedInUserId !== adminId"
                    (click)="deleteAdmin()">
                    Delete Admin
                </button>
            </div>
        </div>

        <div class="details-grid">
            <div class="detail-item">
                <span class="label">Admin ID:</span>
                <span class="value" *ngIf="!isNewAdmin">{{ updatedDetails.adminId }}</span>
                <input type="text" *ngIf="isNewAdmin" name="adminId" [(ngModel)]="updatedDetails.adminId" required
                    #idField="ngModel" [class.is-invalid]="idField.invalid && idField.touched" placeholder="e.g. A1005">
            </div>

            <div class="detail-item">
                <span class="label">Full Name:</span>
                <span class="value" *ngIf="!isEditing">{{ updatedDetails.name }}</span>
                <input type="text" *ngIf="isEditing" name="name" [(ngModel)]="updatedDetails.name" required
                    #nameField="ngModel" [class.is-invalid]="nameField.invalid && nameField.touched">
            </div>

            <div class="detail-item">
                <span class="label">Email:</span>
                <span class="value" *ngIf="!isEditing">{{ updatedDetails.email }}</span>
                <input type="email" *ngIf="isEditing" name="email" [(ngModel)]="updatedDetails.email" required email
                    #emailField="ngModel" [class.is-invalid]="emailField.invalid && emailField.touched">
            </div>

            <div class="detail-item">
                <span class="label">Phone:</span>
                <span class="value" *ngIf="!isEditing">{{ updatedDetails.phoneNumber }}</span>
                <input type="text" *ngIf="isEditing" name="phone" [(ngModel)]="updatedDetails.phoneNumber" required
                    pattern="^[0-9]{10}$" #phoneField="ngModel"
                    [class.is-invalid]="phoneField.invalid && phoneField.touched">
            </div>

            <div class="detail-item">
                <span class="label">Gender:</span>
                <span class="value" *ngIf="!isEditing">{{ updatedDetails.gender }}</span>
                <select *ngIf="isEditing" name="gender" [(ngModel)]="updatedDetails.gender" required
                    #genderField="ngModel" [class.is-invalid]="genderField.invalid && genderField.touched">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="detail-item">
                <span class="label">Date of Birth:</span>
                <span class="value" *ngIf="!isEditing">{{ updatedDetails.dob }}</span>
                <input type="date" *ngIf="isEditing" name="dob" [(ngModel)]="updatedDetails.dob" required
                    #dobField="ngModel" [class.is-invalid]="dobField.invalid && dobField.touched">
            </div>
        </div>

        <div class="footer-actions">
            <button type="button" class="back-button" (click)="goBack()">Back to Admin List</button>
        </div>
    </form>
</div>
