<div class="welcome-dialog">
  <div class="wd-brand">
    <img src="EdunexifyLogo.png" alt="Edunexify" class="wd-logo">
    <span class="wd-brand-name">Edunexify</span>
  </div>

  <div class="wd-avatar">{{ data.name.charAt(0).toUpperCase() }}</div>

  <h1 class="user-name">{{ data.name }}</h1>
  <h2 class="welcome-text">Welcome to <span>Edunexify!</span></h2>

  <p class="greeting">
    Your school portal is ready. Explore fees, attendance, exams, leaves, and more — all in one place.
  </p>

  <div class="celebration">🎉</div>

  <button class="close-btn" (click)="close()">Explore Now →</button>
</div>
